<svg width="100%" viewBox="0 0 760 660" role="img" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif">
  <title>DevOps Portfolio architecture</title>
  <desc>A developer pushes to GitHub, which runs a GitHub Actions CI/CD pipeline (lint, test, build, Trivy scan, push) that publishes a container image to ghcr.io. The image is deployed to a local Kubernetes (kind) cluster, where the Gateway API routes traffic through an HTTPRoute and a ClusterIP Service to a 3-replica FastAPI Deployment. Planned work, shown dashed, covers AWS infrastructure with Terraform and Ansible and observability with Prometheus, Grafana and Loki.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="380" y="26" text-anchor="middle" font-size="17" font-weight="600" fill="#1A1A18">DevOps Portfolio — Architecture</text>

  <!-- Developer -->
  <rect x="300" y="44" width="160" height="46" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="380" y="64" text-anchor="middle" font-size="13" font-weight="600" fill="#44443F">Developer</text>
  <text x="380" y="80" text-anchor="middle" font-size="11" fill="#5F5E5A">git push</text>
  <line x1="380" y1="90" x2="380" y2="108" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- CI/CD -->
  <rect x="60" y="110" width="640" height="124" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="80" y="132" font-size="13" font-weight="600" fill="#3C3489">GitHub Actions — CI/CD&#160;&#160;·&#160;&#160;✅ built</text>

  <rect x="80" y="148" width="104" height="44" rx="6" fill="#FFFFFF" stroke="#534AB7" stroke-width="1"/>
  <text x="132" y="174" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">Lint</text>
  <line x1="184" y1="170" x2="200" y2="170" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="200" y="148" width="104" height="44" rx="6" fill="#FFFFFF" stroke="#534AB7" stroke-width="1"/>
  <text x="252" y="174" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">Test</text>
  <line x1="304" y1="170" x2="320" y2="170" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="320" y="148" width="104" height="44" rx="6" fill="#FFFFFF" stroke="#534AB7" stroke-width="1"/>
  <text x="372" y="174" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">Build</text>
  <line x1="424" y1="170" x2="440" y2="170" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="440" y="148" width="104" height="44" rx="6" fill="#FFFFFF" stroke="#534AB7" stroke-width="1"/>
  <text x="492" y="174" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">Scan</text>
  <line x1="544" y1="170" x2="560" y2="170" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="560" y="148" width="104" height="44" rx="6" fill="#FFFFFF" stroke="#534AB7" stroke-width="1"/>
  <text x="612" y="174" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">Push</text>

  <text x="80" y="220" font-size="11" fill="#534AB7">Lint + Test on push / PR&#160;&#160;·&#160;&#160;Build + Trivy scan + Push on tag v*</text>

  <line x1="380" y1="234" x2="380" y2="254" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Registry -->
  <rect x="300" y="256" width="160" height="46" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="380" y="276" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">ghcr.io</text>
  <text x="380" y="292" text-anchor="middle" font-size="11" fill="#0F6E56">Container registry</text>

  <line x1="380" y1="302" x2="380" y2="322" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Kubernetes -->
  <rect x="60" y="324" width="640" height="172" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text x="80" y="346" font-size="13" font-weight="600" fill="#712B13">Kubernetes cluster — kind (local)&#160;&#160;·&#160;&#160;🚧 in progress</text>
  <text x="80" y="364" font-size="11" fill="#993C1D">Gateway API routing → Service → Deployment</text>

  <rect x="80" y="380" width="120" height="56" rx="6" fill="#FFFFFF" stroke="#993C1D" stroke-width="1"/>
  <text x="140" y="403" text-anchor="middle" font-size="13" font-weight="500" fill="#712B13">Gateway</text>
  <text x="140" y="420" text-anchor="middle" font-size="11" fill="#993C1D">HTTP :80</text>
  <line x1="200" y1="408" x2="226" y2="408" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="226" y="380" width="120" height="56" rx="6" fill="#FFFFFF" stroke="#993C1D" stroke-width="1"/>
  <text x="286" y="403" text-anchor="middle" font-size="13" font-weight="500" fill="#712B13">HTTPRoute</text>
  <text x="286" y="420" text-anchor="middle" font-size="11" fill="#993C1D">path /</text>
  <line x1="346" y1="408" x2="372" y2="408" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="372" y="380" width="120" height="56" rx="6" fill="#FFFFFF" stroke="#993C1D" stroke-width="1"/>
  <text x="432" y="403" text-anchor="middle" font-size="13" font-weight="500" fill="#712B13">Service</text>
  <text x="432" y="420" text-anchor="middle" font-size="11" fill="#993C1D">ClusterIP :80</text>
  <line x1="492" y1="408" x2="518" y2="408" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="518" y="380" width="146" height="56" rx="6" fill="#FFFFFF" stroke="#993C1D" stroke-width="1"/>
  <text x="591" y="403" text-anchor="middle" font-size="13" font-weight="500" fill="#712B13">Deployment</text>
  <text x="591" y="420" text-anchor="middle" font-size="11" fill="#993C1D">3× FastAPI pods</text>

  <text x="80" y="466" font-size="11" fill="#993C1D">ConfigMap + Secret → pod env&#160;&#160;·&#160;&#160;3 replicas for rolling updates &amp; failover</text>

  <line x1="380" y1="496" x2="380" y2="516" stroke="#73726C" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow)"/>

  <!-- Planned -->
  <rect x="60" y="518" width="640" height="112" rx="12" fill="#F4F3EF" stroke="#8A8782" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="80" y="540" font-size="13" font-weight="600" fill="#5F5E5A">Planned&#160;&#160;·&#160;&#160;📋 not started</text>

  <rect x="80" y="554" width="290" height="58" rx="6" fill="#FFFFFF" stroke="#8A8782" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="225" y="578" text-anchor="middle" font-size="13" font-weight="500" fill="#44443F">AWS — EC2 + S3 remote state</text>
  <text x="225" y="595" text-anchor="middle" font-size="11" fill="#5F5E5A">Terraform provisions · Ansible configures</text>

  <rect x="390" y="554" width="290" height="58" rx="6" fill="#FFFFFF" stroke="#8A8782" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="535" y="578" text-anchor="middle" font-size="13" font-weight="500" fill="#44443F">Observability</text>
  <text x="535" y="595" text-anchor="middle" font-size="11" fill="#5F5E5A">Prometheus · Grafana · Loki</text>
</svg>
