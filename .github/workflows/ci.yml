name: CI/CD Pipeline

run-name: ${{github.actor}} is pushing from ${{github.ref}}
on: [push]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14' 
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: ruff .
  
  test: 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14' 
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: pytest 
  
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/danielodriscoll/devops-portfolio:${{ github.sha }}

  scan:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/danielodriscoll/devops-portfolio:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
