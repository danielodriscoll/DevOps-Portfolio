name: CI/CD Pipeline

run-name: ${{github.actor}} is pushing from ${{github.ref}}
on: [push]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14' 
          cache: 'pip'
      - run: pip install -r myapp/requirements.txt
      - run: ruff format .
      - run: ruff lint .
  
  test: 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14' 
          cache: 'pip'
      - run: pip install -r myapp/requirements.txt
      - run: pytest 
  
  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3

      - name: Build image locally
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ghcr.io/danielodriscoll/devops-portfolio:${{ github.sha }}

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@0.28.0   # pinned, not @master
        with:
          image-ref: ghcr.io/danielodriscoll/devops-portfolio:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Log in to registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/danielodriscoll/devops-portfolio:${{ github.sha }}