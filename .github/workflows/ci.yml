name: CI/CD Pipeline

run-name: ${{github.actor}} is pushing from ${{github.ref}}
on:
  push:
  pull_request:

permissions:               # ← add this block at the top level
  contents: read
  packages: write          # ← THIS allows pushing to GHCR
  
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14' 
          cache: 'pip'
      - run: pip install -r myapp/requirements.txt
      - run: ruff format .
      - run: ruff check .
  
  test: 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14' 
          cache: 'pip'
      - run: pip install -r myapp/requirements.txt
      - run: pytest 
  
  docker:
      runs-on: ubuntu-latest
      needs: [lint, test]
      if: github.ref == 'refs/heads/main'
      steps:
        - uses: actions/checkout@v6
          with:
            fetch-depth: 2

        - name: Check if myapp changed
          id: changes
          run: |
            if git diff --name-only HEAD^ HEAD | grep -q '^myapp/'; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi

        - name: Set up Buildx
          if: steps.changes.outputs.changed == 'true'
          uses: docker/setup-buildx-action@v3

        - name: Log in to registry
          if: steps.changes.outputs.changed == 'true'
          uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

        - name: Build image locally
          if: steps.changes.outputs.changed == 'true'
          uses: docker/build-push-action@v5
          with:
            context: myapp
            push: false
            load: true
            tags: ghcr.io/danielodriscoll/devops-portfolio:${{ github.sha }}

        - name: Scan with Trivy
          if: steps.changes.outputs.changed == 'true'
          uses: aquasecurity/trivy-action@v0.36.0
          with:
            image-ref: ghcr.io/danielodriscoll/devops-portfolio:${{ github.sha }}
            format: table
            exit-code: 1
            severity: CRITICAL,HIGH
            ignore-unfixed: true

        - name: Push image
          if: steps.changes.outputs.changed == 'true'
          uses: docker/build-push-action@v5
          with:
            context: myapp
            push: true
            tags: ghcr.io/danielodriscoll/devops-portfolio:${{ github.sha }}