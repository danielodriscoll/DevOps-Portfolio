name: Release Image

run-name: Building image for ${{ github.ref_name }}

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3

      - name: Build image locally
        uses: docker/build-push-action@v5
        with:
          context: myapp
          push: false
          load: true
          tags: ghcr.io/danielodriscoll/devops-portfolio:${{ github.ref_name }}

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/danielodriscoll/devops-portfolio:${{ github.ref_name }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        uses: docker/build-push-action@v5
        with:
          context: myapp
          push: true
          tags: |
            ghcr.io/danielodriscoll/devops-portfolio:${{ github.ref_name }}
            ghcr.io/danielodriscoll/devops-portfolio:latest